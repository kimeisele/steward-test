name: Heartbeat

on:
  schedule:
    - cron: '0 */6 * * *'  # Every 6 hours
  workflow_dispatch:
  repository_dispatch:
    types: [heartbeat-trigger]

permissions:
  contents: write

concurrency:
  group: heartbeat
  cancel-in-progress: false

jobs:
  heartbeat:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Inject node identity from GitHub Secret
        env:
          NODE_KEYS: ${{ secrets.NODE_PRIVATE_KEY }}
        run: |
          mkdir -p data/federation
          printf '%s' "$NODE_KEYS" > data/federation/.node_keys.json
          echo "✅ Node identity injected from NODE_PRIVATE_KEY secret"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel

      - name: Run heartbeat
        run: |
          mkdir -p data/federation
          echo '[{"agent_id":"steward-test","operation":"heartbeat","source":"steward-test","status":"alive","role":"operator"}]' > data/federation/nadi_outbox.json

      - name: Commit federation state
        if: always()
        run: |
          git config user.name "federation-bot"
          git config user.email "bot@federation"
          git add data/federation/ || true
          git diff --cached --quiet || \
            git commit -m "chore: heartbeat federation state"
          git push || true

      - name: Relay outbox to steward-federation hub
        if: always()
        env:
          GH_TOKEN: ${{ secrets.FEDERATION_PAT || secrets.GITHUB_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.FEDERATION_PAT || secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p data/federation
          OUTBOX="data/federation/nadi_outbox.json"

          if [ ! -f "$OUTBOX" ]; then
            echo "[]" > "$OUTBOX"
          fi

          if [ "$(cat "$OUTBOX" | tr -d '[:space:]')" = "[]" ]; then
            echo "Outbox empty, skipping relay"
            exit 0
          fi

          git clone --depth=1 https://x-access-token:${GH_TOKEN}@github.com/kimeisele/steward-federation.git /tmp/hub

          mkdir -p /tmp/hub/nadi

          cp "$OUTBOX" /tmp/hub/nadi/steward-test_to_steward.json

          cd /tmp/hub
          git config user.name "federation-bot"
          git config user.email "bot@federation"
          git add nadi/steward-test_to_steward.json
          git diff --cached --quiet || git commit -m "relay: steward-test outbox → steward (heartbeat #${{ github.run_number }})"
          for attempt in 1 2 3; do
            git push && break
            echo "Push attempt $attempt failed, rebasing..."
            git pull --rebase origin main || true
            sleep $((RANDOM % 10 + 2))
          done

          echo "[]" > "$OUTBOX"
          echo "Outbox relayed and cleared"