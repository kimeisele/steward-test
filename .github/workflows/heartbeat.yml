name: Heartbeat

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:
  repository_dispatch:
    types: [heartbeat-trigger]

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: heartbeat
  cancel-in-progress: false

jobs:
  heartbeat:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.FEDERATION_PAT || secrets.GITHUB_TOKEN }}

      - name: Restore node keys cache
        uses: actions/cache/restore@v4
        with:
          path: data/federation/.node_keys.json
          key: node-keys-${{ github.repository }}-v1
          restore-keys: |
            node-keys-${{ github.repository }}-

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install nadi-kit
        env:
          GH_TOKEN: ${{ secrets.FEDERATION_PAT || secrets.GITHUB_TOKEN }}
        run: |
          python -m pip install --upgrade pip
          pip install --upgrade "git+https://${GH_TOKEN}@github.com/kimeisele/steward-federation.git#egg=nadi-kit"

      - name: Run chaos controller
        id: chaos
        env:
          GH_TOKEN: ${{ secrets.FEDERATION_PAT || secrets.GITHUB_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.FEDERATION_PAT || secrets.GITHUB_TOKEN }}
        run: |
          python src/chaos_controller.py
          echo "phase_exit=$?" >> $GITHUB_OUTPUT
        continue-on-error: true

      - name: Run NADI heartbeat cycle
        if: steps.chaos.outcome == 'success'
        env:
          GH_TOKEN: ${{ secrets.FEDERATION_PAT || secrets.GITHUB_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.FEDERATION_PAT || secrets.GITHUB_TOKEN }}
        run: |
          nadi --peer-json data/federation/peer.json sync
          nadi --peer-json data/federation/peer.json heartbeat --health 1.0
          nadi --peer-json data/federation/peer.json sync

      - name: Commit federation state
        if: always()
        run: |
          git config user.name "steward-test-bot"
          git config user.email "bot@steward-test"
          git add data/federation/ || true
          git diff --cached --quiet ||             git commit -m "chore: heartbeat state [phase=${{ steps.chaos.outputs.phase_exit }}]"
          git push || true

      - name: Save node keys cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: data/federation/.node_keys.json
          key: node-keys-${{ github.repository }}-v1

      - name: Relay outbox to steward-federation hub
        if: steps.chaos.outcome == 'success'
        env:
          GH_TOKEN: ${{ secrets.FEDERATION_PAT || secrets.GITHUB_TOKEN }}
        run: |
          OUTBOX="data/federation/nadi_outbox.json"
          if [ ! -f "$OUTBOX" ] || [ "$(cat "$OUTBOX" | tr -d "[:space:]")" = "[]" ]; then
            echo "Outbox empty, skipping relay"
            exit 0
          fi
          git clone --depth=1 https://x-access-token:${GH_TOKEN}@github.com/kimeisele/steward-federation.git /tmp/hub
          mkdir -p /tmp/hub/nadi
          cp "$OUTBOX" /tmp/hub/nadi/steward-test_to_steward.json
          cd /tmp/hub
          git config user.name "steward-test-bot"
          git config user.email "bot@steward-test"
          git add nadi/steward-test_to_steward.json
          git diff --cached --quiet || git commit -m "relay: steward-test outbox -> steward (#${{ github.run_number }})"
          max_retries=10
          count=0
          until git push origin main; do
            count=$((count+1))
            if [ $count -gt $max_retries ]; then echo "Push failed after $max_retries attempts"; exit 1; fi
            backoff=$(( (RANDOM % 15) + 2 ))
            echo "Race condition. Backoff ${backoff}s then rebase..."
            sleep $backoff
            git pull --rebase origin main
          done
          echo "[]" > "$OUTBOX"
          echo "Outbox relayed and cleared"
